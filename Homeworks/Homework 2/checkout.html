<html lang="en">
    <head>
      <title>Checkout</title>
    <style>
        h3 {
            text-align: center;
            font-family: Impacr;
        }
        p {
            font-family: Courier;
        }
    </style>
    </head>
    <body style="background-color:rgb(223, 239, 244)";>
        <h3>Checkout</h3>
        <form action="thankYou.html">
            <p>Please select which items you would like to purchase (limit one per item).</p>
            <p>To select multiple items, hold down the control key (Windows) or command key (Mac) while selecting.</p>
            <select name="Mystical Items" size="5" multiple="multiple" >
                <option value="flying horse" >Flying Horse</option>
                <option value="magic wand">Magic Wand</option>
                <option value="job" >Guaranteed Six-Figure Salary</option>
                <option value="taylor swift" >Taylor Swift Meet and Greet</option>
                <option value="world peace" >World Peace</option>
            </select>
            <input type="submit" name="place order" value="Place Order" />
        </form>

    </body>
</html>
